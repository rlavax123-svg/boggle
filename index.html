<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#f4ede0" />
<title>Bogglr — a word companion for Boggle</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<main>
  <header>
    <h1 class="brand">
      <span class="mark">Bogglr<span class="dot">.</span></span>
    </h1>
    <p class="tagline">A Boggle companion for Isabelle and Rory.</p>
  </header>

  <div class="stage">
    <section class="grid-section">
      <div id="grid" class="grid" data-size="4"></div>

      <div class="actions">
        <button id="solve" class="primary">Solve</button>
        <button id="random">Random</button>
        <button id="clear">Clear</button>
      </div>

      <div class="settings">
        <label>
          <span>Size</span>
          <select id="size">
            <option value="4" selected>4 × 4</option>
            <option value="5">5 × 5</option>
            <option value="6">6 × 6</option>
          </select>
        </label>
        <label>
          <span>Min length</span>
          <select id="minLen">
            <option value="3" selected>3</option>
            <option value="4">4</option>
            <option value="5">5</option>
          </select>
        </label>
      </div>
    </section>

    <div id="status" class="status" aria-live="polite"></div>

    <section id="results" class="results" hidden>
    <div class="results-header">
      <h2>Results</h2>
      <div class="summary" id="summary"></div>
    </div>
    <div class="filters">
      <input id="filter" type="search" placeholder="Filter words…" autocomplete="off" />
    </div>
    <ol id="wordList" class="word-list"></ol>
    </section>
  </div>
</main>

<script src="solver.js"></script>
<script src="app.js"></script>
</body>
</html>
